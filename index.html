<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FluxoMod - Ferramenta de diagramação open source, offline e segura. Alternativa ao LucidChart.">
    <title>FluxoMod — Diagramação</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='2' y='2' width='28' height='28' rx='6' fill='%236366f1'/><path d='M8 11h16M8 16h12M8 21h8' stroke='white' stroke-width='2' stroke-linecap='round'/></svg>">
</head>
<body>
<div id="app">

    <!-- TOP BAR -->
    <div id="topbar">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <rect x="2" y="2" width="20" height="20" rx="4"/>
                <path d="M6 8h12M6 12h9M6 16h6"/>
            </svg>
            FluxoMod
        </div>

        <div class="menu-group">
            <button class="menu-btn" data-menu="file-menu" onclick="app.toggleDropdown('file-menu')">Arquivo ▾</button>
            <div class="dropdown-menu" id="file-menu">
                <button class="dropdown-item" onclick="app.newProject()">📄 Novo <span class="shortcut">Ctrl+N</span></button>
                <button class="dropdown-item" onclick="app.openProject()">📂 Abrir <span class="shortcut">Ctrl+O</span></button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" onclick="app.saveProject()">💾 Salvar <span class="shortcut">Ctrl+S</span></button>
                <button class="dropdown-item" onclick="app.saveProjectAs()">💾 Salvar como <span class="shortcut">Ctrl+Shift+S</span></button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" onclick="ExportManager.exportJSON(app)">📥 Exportar .fluxo</button>
                <button class="dropdown-item" onclick="ExportManager.exportPNG(app)">🖼️ Exportar PNG <span class="shortcut">Ctrl+E</span></button>
                <button class="dropdown-item" onclick="ExportManager.exportSVG(app)">📐 Exportar SVG <span class="shortcut">Ctrl+Shift+E</span></button>
            </div>

            <button class="menu-btn" data-menu="edit-menu" onclick="app.toggleDropdown('edit-menu')">Editar ▾</button>
            <div class="dropdown-menu" id="edit-menu">
                <button class="dropdown-item" id="btn-undo" onclick="app.undo()">↩️ Desfazer <span class="shortcut">Ctrl+Z</span></button>
                <button class="dropdown-item" id="btn-redo" onclick="app.redo()">↪️ Refazer <span class="shortcut">Ctrl+Y</span></button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" onclick="app.clipboard.copy()">📋 Copiar <span class="shortcut">Ctrl+C</span></button>
                <button class="dropdown-item" onclick="app.clipboard.cut()">✂️ Recortar <span class="shortcut">Ctrl+X</span></button>
                <button class="dropdown-item" onclick="app.clipboard.paste()">📌 Colar <span class="shortcut">Ctrl+V</span></button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" onclick="app.duplicateSelected()">📑 Duplicar <span class="shortcut">Ctrl+D</span></button>
                <button class="dropdown-item" onclick="app.selection.selectAll()">⬜ Selecionar tudo <span class="shortcut">Ctrl+A</span></button>
                <button class="dropdown-item" onclick="app.selection.deleteSelected()">🗑️ Excluir <span class="shortcut">Del</span></button>
            </div>

            <button class="menu-btn" data-menu="view-menu" onclick="app.toggleDropdown('view-menu')">Exibir ▾</button>
            <div class="dropdown-menu" id="view-menu">
                <button class="dropdown-item" onclick="app.zoomIn()">🔍 Zoom In <span class="shortcut">Ctrl++</span></button>
                <button class="dropdown-item" onclick="app.zoomOut()">🔍 Zoom Out <span class="shortcut">Ctrl+-</span></button>
                <button class="dropdown-item" onclick="app.zoomReset()">🔍 Zoom 100% <span class="shortcut">Ctrl+0</span></button>
                <button class="dropdown-item" onclick="app.zoomToFit()">📐 Ajustar à tela <span class="shortcut">Ctrl+Shift+F</span></button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" onclick="app.toggleGrid()">🔲 Grade <span class="shortcut">Ctrl+G</span></button>
                <button class="dropdown-item" onclick="app.toggleRulers()">📏 Réguas <span class="shortcut">Ctrl+R</span></button>
            </div>

            <button class="menu-btn" onclick="app.showTemplateDialog()">Templates</button>
        </div>

        <span class="project-name" id="project-name" onclick="app.saveProjectAs()">Sem título</span>
        <span id="save-indicator">✓ Salvo</span>
    </div>

    <!-- TOOLBAR -->
    <div id="toolbar">
        <button class="tool-btn active" data-tool="select" data-tooltip="Seleção (V)" onclick="app.setTool('select')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4l7 18 2.5-7.5L21 12z"/></svg>
        </button>
        <button class="tool-btn" data-tool="pan" data-tooltip="Mão (H)" onclick="app.setTool('pan')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 11V6a2 2 0 00-4 0v1M14 10V4a2 2 0 00-4 0v6M10 10.5V5a2 2 0 00-4 0v9"/><path d="M18 11a2 2 0 014 0v3a8 8 0 01-8 8h-2c-2.5 0-3.78-.86-5.25-2.33L4.42 17.28a2 2 0 012.83-2.83L10 17"/></svg>
        </button>

        <div class="separator"></div>

        <button class="tool-btn" data-tool="shape:rectangle" data-tooltip="Retângulo (R)" onclick="app.setTool('shape:rectangle')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14"/></svg>
        </button>
        <button class="tool-btn" data-tool="shape:roundedRect" data-tooltip="Retângulo Arredondado" onclick="app.setTool('shape:roundedRect')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="4"/></svg>
        </button>
        <button class="tool-btn" data-tool="shape:circle" data-tooltip="Círculo (O)" onclick="app.setTool('shape:circle')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
        </button>
        <button class="tool-btn" data-tool="shape:diamond" data-tooltip="Losango (D)" onclick="app.setTool('shape:diamond')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 22,12 12,22 2,12"/></svg>
        </button>
        <button class="tool-btn" data-tool="shape:triangle" data-tooltip="Triângulo" onclick="app.setTool('shape:triangle')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,3 22,21 2,21"/></svg>
        </button>

        <div class="separator"></div>

        <button class="tool-btn" data-tool="connector" data-tooltip="Conector (L)" onclick="app.setTool('connector')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="5" x2="19" y2="19"/><polyline points="19 13 19 19 13 19"/></svg>
        </button>
        <select class="toolbar-select" id="connector-type" data-tooltip="Tipo de conector">
            <option value="elbow">Cotovelo</option>
            <option value="straight">Reto</option>
            <option value="curved">Curvo</option>
        </select>

        <div class="separator"></div>

        <button class="tool-btn" data-tool="text" data-tooltip="Texto (T)" onclick="app.setTool('text')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="4" x2="18" y2="4"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/></svg>
        </button>

        <div class="separator"></div>

        <button class="tool-btn" data-tooltip="Desfazer (Ctrl+Z)" id="btn-undo" onclick="app.undo()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-8.36L1 10"/></svg>
        </button>
        <button class="tool-btn" data-tooltip="Refazer (Ctrl+Y)" id="btn-redo" onclick="app.redo()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-5.64-8.36L23 10"/></svg>
        </button>

        <div class="separator"></div>

        <span class="toolbar-label">Preench.</span>
        <input type="color" class="tool-color" id="toolbar-fill" value="#ffffff" title="Cor de preenchimento" onchange="if(app.selection.selectedShapes.length){app.selection.selectedShapes.forEach(s=>s.style.fillColor=this.value);app.render()}">
        <span class="toolbar-label">Borda</span>
        <input type="color" class="tool-color" id="toolbar-stroke" value="#2d3436" title="Cor da borda" onchange="if(app.selection.selectedShapes.length){app.selection.selectedShapes.forEach(s=>s.style.strokeColor=this.value);app.render()}">
    </div>

    <!-- MAIN AREA -->
    <div id="main">
        <!-- LEFT PANEL -->
        <div id="left-panel">
            <div class="panel-tabs">
                <button class="panel-tab active" onclick="this.parentElement.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));this.classList.add('active');document.getElementById('shapes-panel').style.display='block';document.getElementById('layers-panel').style.display='none'">Formas</button>
                <button class="panel-tab" onclick="this.parentElement.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));this.classList.add('active');document.getElementById('shapes-panel').style.display='none';document.getElementById('layers-panel').style.display='block'">Camadas</button>
            </div>
            <div class="panel-content" id="shapes-panel">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" placeholder="Buscar formas..." id="shape-search" oninput="document.querySelectorAll('.shape-item').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(this.value.toLowerCase())?'':'none'})">
                </div>
                <div id="shape-library"></div>
            </div>
            <div class="panel-content" id="layers-panel" style="display:none">
                <div id="layers-list"></div>
            </div>
        </div>

        <!-- CANVAS -->
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
            <div id="text-editor"><textarea rows="3"></textarea></div>
            <div id="minimap"><canvas id="minimap-canvas"></canvas></div>
        </div>

        <!-- RIGHT PANEL -->
        <div id="right-panel">
            <div class="panel-header">Propriedades</div>
            <div class="panel-content" id="prop-content">
                <div class="prop-group">
                    <div class="prop-group-title">Propriedades</div>
                    <p style="font-size:12px;color:var(--text-muted)">Selecione um elemento para editar suas propriedades</p>
                </div>
            </div>
        </div>
    </div>

    <!-- STATUS BAR -->
    <div id="statusbar">
        <div class="status-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2C20 17.5 12 22 12 22z"/></svg>
            <span id="cursor-pos">0, 0</span>
        </div>
        <div class="status-item">
            <span id="shape-count">0 formas</span>
        </div>
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="app.zoomOut()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <span class="zoom-value" id="zoom-value" onclick="app.zoomReset()">100%</span>
            <button class="zoom-btn" onclick="app.zoomIn()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button class="zoom-btn" onclick="app.zoomToFit()" title="Ajustar à tela">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
            </button>
        </div>
    </div>

    <!-- CONTEXT MENU -->
    <div id="context-menu"></div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- TEMPLATE MODAL -->
    <div class="modal-overlay" id="template-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Escolha um Template</span>
                <button class="modal-close" onclick="app.closeAllDialogs()">✕</button>
            </div>
            <div class="modal-body">
                <div class="template-grid" id="template-grid"></div>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="js/utils.js"></script>
<script src="js/shapes.js"></script>
<script src="js/connectors.js"></script>
<script src="js/history.js"></script>
<script src="js/grid.js"></script>
<script src="js/selection.js"></script>
<script src="js/export.js"></script>
<script src="js/storage.js"></script>
<script src="js/shortcuts.js"></script>
<script src="js/clipboard.js"></script>
<script src="js/align.js"></script>
<script src="js/minimap.js"></script>
<script src="js/templates.js"></script>
<script src="js/app.js"></script>
<script>
    // Populate templates
    document.addEventListener('DOMContentLoaded', () => {
        const grid = document.getElementById('template-grid');
        if (grid) {
            TemplateManager.getTemplates().forEach(t => {
                const card = document.createElement('div');
                card.className = 'template-card';
                card.innerHTML = `<span class="icon">${t.icon}</span><span class="name">${t.name}</span><span class="desc">${t.description}</span>`;
                card.onclick = () => app.applyTemplate(t.id);
                grid.appendChild(card);
            });
        }
    });
</script>
</body>
</html>
